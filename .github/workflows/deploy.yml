name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Copy portfolio files
      run: |
        mkdir -p dist
        # Copier le bon fichier HTML
        if [ -f "artifacts/portfolio/index.test.html" ]; then
          cp artifacts/portfolio/index.test.html dist/index.html
        elif [ -f "public/index.html" ]; then
          cp public/index.html dist/index.html
        else
          echo "Error: No HTML file found"
          exit 1
        fi
        # Copier les assets si existants
        cp -r artifacts/portfolio/attached_assets dist/ 2>/dev/null || true
        cp -r public/attached_assets dist/ 2>/dev/null || true
        # Vérifier que le fichier existe
        ls -la dist/
        
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
